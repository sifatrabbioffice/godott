# iOS Unsigned IPA Build Configuration
# Godot Engine Editor - Single Layer (arm64)

[build_settings]
# Architecture: arm64 (device only) - Single Layer
arch=arm64
min_ios_version=14.0
target=release
tools=yes
dev_mode=no
production=yes

[code_signing]
# Disable code signing for unsigned IPA
sign_identity=
code_signing_required=no
code_signing_allowed=no
provisioning_profile=

[build_flags]
use_lto=none
lto=none
use_volk=False
metal=True
opengl3=False
vulkan=False

[compiler_flags]
# Objective-C ARC enabled
fobjc_arc=true
# Single architecture (no universal binary)
arch_flags=-arch arm64
minimum_version_flag=-miphoneos-version-min=14.0

[output]
# Output IPA filename pattern
ipa_name=godot_editor_arm64_unsigned.ipa
payload_dir=Payload

[xcode_settings]
# Xcode Build Settings
ARCHS=arm64
VALID_ARCHS=arm64
EXCLUDED_ARCHS=arm64e x86_64 i386
IPHONEOS_DEPLOYMENT_TARGET=14.0
ONLY_ACTIVE_ARCH=NO
CODE_SIGN_IDENTITY=
CODE_SIGNING_REQUIRED=NO
CODE_SIGNING_ALLOWED=NO
